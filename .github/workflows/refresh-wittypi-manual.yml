name: Refresh WittyPi manual

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest WittyPi manual
        run: |
          curl -fsSL -o docs/field/WittyPi2_UserManual.pdf \
            http://www.uugear.com/doc/WittyPi2_UserManual.pdf
          file docs/field/WittyPi2_UserManual.pdf

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/field/WittyPi2_UserManual.pdf; then
            echo "Manual unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/field/WittyPi2_UserManual.pdf
          git commit -m "Refresh WittyPi manual from vendor"
          git push
